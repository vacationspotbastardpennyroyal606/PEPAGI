services:
  pepagi:
    build: .
    restart: unless-stopped
    volumes:
      - pepagi_data:/data
    env_file:
      - .env
    ports:
      - "3099:3099"
      - "3100:3100"
    environment:
      - PEPAGI_DATA_DIR=/data
      - PEPAGI_HOST=0.0.0.0
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pepagi_data:
